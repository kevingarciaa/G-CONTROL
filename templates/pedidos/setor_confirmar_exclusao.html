{% extends "base.html" %}
{% block title %}Excluir setor{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Excluir setor</h4>
    <a href="{% url 'pedidos:setores_lista' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Voltar</a>
</div>
<div class="card">
    <div class="card-body">
        <p>Tem certeza que deseja excluir o setor <strong>{{ setor.nome }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Excluir</button>
            <a href="{% url 'pedidos:setores_lista' %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
