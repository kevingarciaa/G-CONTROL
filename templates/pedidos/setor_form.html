{% extends "base.html" %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">{{ titulo }}</h4>
    <a href="{% url 'pedidos:setores_lista' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Voltar</a>
</div>
<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nome</label>
                    {{ form.nome }}
                    {% if form.nome.errors %}<div class="invalid-feedback d-block">{{ form.nome.errors.0 }}</div>{% endif %}
                </div>
                <div class="col-md-3">
                    <label class="form-label">Ordem</label>
                    {{ form.ordem }}
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <div class="form-check">
                        {{ form.ativo }}
                        <label class="form-check-label" for="{{ form.ativo.id_for_label }}">Ativo</label>
                    </div>
                </div>
            </div>
            <hr class="my-4">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="{% url 'pedidos:setores_lista' %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
