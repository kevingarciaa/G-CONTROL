{% extends "base.html" %}
{% block title %}Cadastro{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Cadastro</h4>
</div>
<div class="row g-4">
    <div class="col-md-6">
        <a href="{% url 'clientes:lista' %}" class="card text-decoration-none text-dark h-100 border-primary hover-shadow">
            <div class="card-body d-flex align-items-center">
                <div class="rounded-circle bg-primary bg-opacity-10 p-3 me-3">
                    <i class="bi bi-people fs-2 text-primary"></i>
                </div>
                <div>
                    <h5 class="card-title mb-1">Clientes</h5>
                    <p class="card-text text-muted small mb-0">Cadastrar e gerenciar clientes</p>
                </div>
                <i class="bi bi-chevron-right ms-auto text-primary"></i>
            </div>
        </a>
    </div>
    <div class="col-md-6">
        <a href="{% url 'fornecedores:lista' %}" class="card text-decoration-none text-dark h-100 border-primary hover-shadow">
            <div class="card-body d-flex align-items-center">
                <div class="rounded-circle bg-primary bg-opacity-10 p-3 me-3">
                    <i class="bi bi-truck fs-2 text-primary"></i>
                </div>
                <div>
                    <h5 class="card-title mb-1">Fornecedores</h5>
                    <p class="card-text text-muted small mb-0">Cadastrar e gerenciar fornecedores</p>
                </div>
                <i class="bi bi-chevron-right ms-auto text-primary"></i>
            </div>
        </a>
    </div>
</div>
{% endblock %}
